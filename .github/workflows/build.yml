name: Build APK

on:
  workflow_dispatch:

jobs:
  build_apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Flet
        run: pip install flet

      - name: Build Android APK
        run: flet build apk

      - name: Upload APK File
        uses: actions/upload-artifact@v4
        with:
          name: Future-Doctor-APK
          path: build/apk/*.apk
